<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title data-i18n="app.title">UACJ OBD-II Training Simulator</title>
<script src="/i18n.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --warn:#f0883e; --bad:#f85149; --ok:#3fb950; }
  * { box-sizing: border-box; }
  body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--line); display: flex; gap: 16px; align-items: center; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  main { display: grid; grid-template-columns: 280px 1fr; gap: 16px; padding: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 10px; }
  button { background: var(--accent); color: #0d1117; border: 0; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  button.secondary { background: transparent; color: var(--fg); border: 1px solid var(--line); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .gauges { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
  .gauge { background: #0d1117; border: 1px solid var(--line); border-radius: 6px; padding: 10px; }
  .gauge .name { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .gauge .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .gauge .unit { color: var(--muted); font-size: 12px; margin-left: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; }
  .dtc-stored { color: var(--bad); }
  .dtc-pending { color: var(--warn); }
  .dtc-permanent { color: var(--bad); font-weight: 600; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .pill.ok { background: rgba(63,185,80,.15); color: var(--ok); }
  .pill.warn { background: rgba(240,136,62,.15); color: var(--warn); }
  .pill.bad { background: rgba(248,81,73,.15); color: var(--bad); }
  input, select, textarea { background: #0d1117; color: var(--fg); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; }
  .muted { color: var(--muted); }
  .stack > * + * { margin-top: 12px; }
  code { background: #0d1117; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1 data-i18n="app.title">UACJ OBD-II Training Simulator</h1>
  <span class="sub" data-i18n="app.subtitle.acquisition">Phase 1 — Acquisition Dashboard</span>
  <a href="/scenarios.html" data-i18n="nav.scenarios" style="color:var(--accent); text-decoration:none; font-size:13px;">Scenarios →</a>
  <a href="/classroom.html" data-i18n="nav.classroom" style="color:var(--accent); text-decoration:none; font-size:13px;">Classroom →</a>
  <a href="/diff.html" data-i18n="nav.diff" style="color:var(--accent); text-decoration:none; font-size:13px;">Diff →</a>
  <span class="pill ok" id="status-pill" data-i18n="status.idle">idle</span>
</header>
<main>
  <aside class="panel stack">
    <h2 data-i18n="session.heading">Session</h2>
    <div class="row">
      <select id="adapter">
        <option value="auto">auto</option>
        <option value="mock" selected>mock</option>
        <option value="elm327">elm327</option>
      </select>
      <input id="port" data-i18n-placeholder="session.port" placeholder="port (e.g. /dev/ttyUSB0)" style="flex:1; min-width: 0;" />
    </div>
    <div class="row">
      <button id="start" data-i18n="session.start">Start</button>
      <button id="stop" class="secondary" data-i18n="session.stop" disabled>Stop</button>
    </div>
    <div id="vehicle" class="muted" data-i18n="session.no_vehicle">no vehicle connected</div>

    <h2 data-i18n="vehicles.heading">Vehicles</h2>
    <div id="vehicles"></div>

    <h2 data-i18n="sessions.heading">Past Sessions</h2>
    <div id="sessions"></div>

    <h2 data-i18n="common.backup">Backup all data</h2>
    <div class="row">
      <button id="backup-btn" class="secondary" data-i18n="common.backup">Backup all data</button>
    </div>
    <div class="row">
      <input type="file" id="restore-file" accept=".zip" style="font-size:12px; flex:1; min-width:0;" />
      <button id="restore-btn" class="secondary" data-i18n="common.restore">Restore</button>
    </div>
  </aside>

  <section class="stack">
    <div class="panel">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;">
        <h2 data-i18n="live.heading" style="margin:0">Live Parameters</h2>
        <div style="display:flex; gap:6px; align-items:center;">
          <label style="display:flex; align-items:center; gap:4px; font-size:13px;">
            <input type="checkbox" id="show-all-pids" />
            <span data-i18n="live.show_all">Show all captured PIDs</span>
          </label>
          <span class="pill" id="gauge-count" style="font-size:11px;">0</span>
        </div>
      </div>
      <div class="gauges" id="gauges"></div>
    </div>
    <div class="panel">
      <h2 data-i18n="dtcs.heading">DTCs</h2>
      <table><thead><tr>
        <th data-i18n="dtcs.code">Code</th>
        <th data-i18n="dtcs.status">Status</th>
        <th data-i18n="dtcs.description">Description</th>
      </tr></thead>
        <tbody id="dtcs"></tbody></table>
    </div>
    <div class="panel">
      <h2 data-i18n="monitors.heading">Readiness Monitors</h2>
      <table><thead><tr>
        <th data-i18n="monitors.name">Monitor</th>
        <th data-i18n="monitors.supported">Supported</th>
        <th data-i18n="monitors.ready">Ready</th>
      </tr></thead>
        <tbody id="monitors"></tbody></table>
    </div>
  </section>
</main>

<script>
// v0.5.3: the 12-PID "common" set the dashboard used to hardcode for both
// capture AND display. We keep this list ONLY for the default "Show all
// captured PIDs" = unchecked view (focused/compact). Capture itself no
// longer sends a list — the server auto-discovers every PID the car
// supports (v0.4.9 behaviour) and stores them all in the session.
const COMMON_PIDS = ["010C","010D","0105","010F","0110","0111","0104","0106","0107","010B","0114","012F"];
let pollTimer = null;
let currentSessionId = null;
let showAllPids = false;

function $(id) { return document.getElementById(id); }
function setStatus(text, kind="ok") {
  const p = $("status-pill");
  p.textContent = text;
  p.className = "pill " + kind;
}

async function api(path, opts={}) {
  const r = await fetch(path, { headers: {"Content-Type": "application/json"}, ...opts });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

async function start() {
  const adapter = $("adapter").value;
  const port = $("port").value || null;
  setStatus("starting…", "warn");
  try {
    // v0.5.3: don't pass a PID list — let the server discover the car's
    // full supported set so the capture is complete. The dashboard
    // display still defaults to the compact 12-PID view; user can
    // toggle "Show all captured PIDs" to see everything.
    const r = await api("/api/sessions/start", { method: "POST",
      body: JSON.stringify({ adapter, portstr: port }) });
    currentSessionId = r.session_id;
    setStatus(`recording: ${r.session_id.slice(0,16)}…`, "ok");
    $("start").disabled = true;
    $("stop").disabled = false;
    $("vehicle").innerHTML = renderVehicle(r.vehicle);
    await loadStatic();
    pollTimer = setInterval(refresh, 800);
  } catch (e) {
    setStatus("error", "bad");
    alert(e.message);
  }
}

async function stop() {
  try {
    await api("/api/sessions/stop", { method: "POST" });
    setStatus("stopping…", "warn");
  } catch (e) { alert(e.message); }
}

function renderVehicle(v) {
  if (!v) return "no vehicle";
  const bits = [];
  if (v.year) bits.push(v.year);
  if (v.make) bits.push(v.make);
  if (v.model) bits.push(v.model);
  return `<div><strong>${bits.join(" ") || "Unknown vehicle"}</strong></div>` +
         `<div class="muted">VIN: <code>${v.vin || "—"}</code></div>`;
}

async function loadStatic() {
  if (!currentSessionId) return;
  const s = await api(`/api/sessions/${currentSessionId}`);
  const dtcs = s.dtcs || [];
  $("dtcs").innerHTML = dtcs.length === 0
    ? `<tr><td colspan="3" class="muted">no DTCs</td></tr>`
    : dtcs.map(d => `<tr><td><code>${d.code}</code></td><td class="dtc-${d.status}">${d.status}</td><td>${d.description||""}</td></tr>`).join("");
  const mons = s.monitors || [];
  $("monitors").innerHTML = mons.map(m =>
    `<tr><td>${m.name}</td><td>${m.supported ? '<span class="pill ok">yes</span>' : '<span class="pill bad">no</span>'}</td>` +
    `<td>${m.ready ? '<span class="pill ok">ready</span>' : '<span class="pill warn">incomplete</span>'}</td></tr>`).join("");
}

async function refresh() {
  if (!currentSessionId) return;
  // v0.5.3: pull more samples so the "show all" mode has data for every
  // PID the car reports (a 100-PID capture cycles through them
  // serially, so 200 samples can leave the rarer PIDs without any
  // value visible to the dashboard yet).
  const live = await api(`/api/sessions/${currentSessionId}/live?limit=2000`);
  const latest = {};
  for (const s of live) latest[s.pid] = s;
  // PID set to render: either the focused 12-PID common set OR every
  // PID we've seen a sample for in this session. Toggle is the
  // checkbox at the top of the panel.
  let pidList;
  if (showAllPids) {
    pidList = Object.keys(latest).sort();
  } else {
    pidList = COMMON_PIDS;
  }
  $("gauges").innerHTML = pidList.map(p => {
    const s = latest[p];
    if (!s) return `<div class="gauge"><div class="name">${p}</div><div class="value muted">—</div></div>`;
    const v = typeof s.value === "number" ? s.value.toFixed(1) : s.value;
    return `<div class="gauge"><div class="name">${s.name || p}</div>` +
           `<div class="value">${v}<span class="unit">${s.unit || ""}</span></div></div>`;
  }).join("");
  $("gauge-count").textContent = `${pidList.length} / ${Object.keys(latest).length}`;
  const cur = await api("/api/sessions/current");
  if (!cur.active) {
    clearInterval(pollTimer);
    pollTimer = null;
    $("start").disabled = false;
    $("stop").disabled = true;
    setStatus("idle");
    await loadVehicles();
    await loadSessions();
  }
}

async function loadVehicles() {
  const v = await api("/api/vehicles");
  $("vehicles").innerHTML = v.length === 0
    ? `<div class="muted">none yet</div>`
    : v.map(x => `<div>${x.year || ""} ${x.make || ""} ${x.model || ""} <span class="muted">${x.vin}</span></div>`).join("");
}

async function loadSessions() {
  const s = await api("/api/sessions");
  $("sessions").innerHTML = s.length === 0
    ? `<div class="muted">none yet</div>`
    : s.slice(0, 10).map(x => `<div><a href="/session.html?id=${x.session_id}">${x.session_id}</a> <span class="muted">${x.sample_count} samples</span></div>`).join("");
}

$("start").onclick = start;
$("stop").onclick = stop;
$("show-all-pids").onchange = (e) => {
  showAllPids = e.target.checked;
  if (currentSessionId) refresh();  // immediate re-render with new filter
};

// Backup: download a ZIP of every session + the SQLite metadata
$("backup-btn").onclick = async () => {
  try {
    const r = await fetch("/api/backup", { method: "POST" });
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:T]/g, "-").slice(0, 19);
    a.href = url;
    a.download = `uacj-backup-${stamp}.zip`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) { alert(e.message); }
};

// Restore: upload a previously-saved ZIP, replacing the current data dir
$("restore-btn").onclick = async () => {
  const fileInput = $("restore-file");
  if (!fileInput.files || fileInput.files.length === 0) {
    alert("Pick a backup .zip first");
    return;
  }
  const fd = new FormData();
  fd.append("file", fileInput.files[0]);
  try {
    const r = await fetch("/api/restore", { method: "POST", body: fd });
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    const j = await r.json();
    alert(`Restored ${j.sessions || 0} session(s). Reload to see them.`);
    location.reload();
  } catch (e) { alert(e.message); }
};

// Re-render dynamic content when the language toggle fires.
document.addEventListener("uacj:lang-changed", async () => {
  await loadVehicles();
  await loadSessions();
  await loadStatic();
});

loadVehicles();
loadSessions();

// v0.6.6: surface operational warnings (disk + version mismatch) at
// the top of the page so Cristopher notices them before starting a
// capture. We never block the UI — these are informational. The
// version probe is fire-and-forget (the Pi may legitimately be
// offline if he hasn't powered it on yet).
async function loadHealthBanners() {
  const banner = document.createElement("div");
  banner.id = "health-banner";
  banner.style.cssText = "margin:8px 16px; display:flex; flex-direction:column; gap:4px;";
  document.body.insertBefore(banner, document.body.firstChild);

  try {
    const disk = await api("/api/disk");
    if (!disk.ok || disk.warn) {
      const div = document.createElement("div");
      const cls = disk.ok ? "pill warn" : "pill bad";
      div.innerHTML = `<span class="${cls}" style="margin-right:6px;">${disk.ok ? "DISK" : "DISK FULL"}</span>${disk.message}`;
      banner.appendChild(div);
    }
  } catch (e) { /* health is best-effort */ }

  try {
    const ver = await api("/api/sim/version-check");
    if (ver.verdict !== "match" && ver.verdict !== "unreachable") {
      const div = document.createElement("div");
      div.innerHTML = `<span class="pill warn" style="margin-right:6px;">VERSION</span>laptop ${ver.laptop_version} ↔ Pi ${ver.pi_version || "?"} — ${ver.message}`;
      banner.appendChild(div);
    }
    // "unreachable" is silent — Pi might just be off
  } catch (e) { /* health is best-effort */ }
}
loadHealthBanners();
</script>
</body>
</html>
